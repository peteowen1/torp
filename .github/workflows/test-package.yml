name: R Package Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: ubuntu-latest (R release)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

      - name: Validate pkgdown reference index
        run: |
          install.packages("pkgdown", repos = "https://cloud.r-project.org")
          pkg <- pkgdown::as_pkgdown(".")
          pkgdown:::data_reference_index(pkg)
          cat("pkgdown reference index OK\n")
        shell: Rscript {0}

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Test coverage
        run: |
          # Patch merge_coverage to skip corrupt trace files (covr subprocess
          # can produce truncated gzip when saveRDS runs out of memory)
          ns <- asNamespace("covr")
          unlockBinding("merge_coverage.character", ns)
          assign("merge_coverage.character", function(x, ...) {
            good <- Filter(function(f) {
              tryCatch({ readRDS(f); TRUE }, error = function(e) {
                message("Skipping corrupt covr trace: ", basename(f))
                FALSE
              })
            }, x)
            if (length(good) == 0) stop("All coverage trace files are corrupt")
            covr:::merge_coverage(lapply(good, function(f) {
              as.list(suppressWarnings(readRDS(f)))
            }))
          }, envir = ns)
          lockBinding("merge_coverage.character", ns)

          cov <- covr::package_coverage(
            type = "tests",
            quiet = FALSE,
            clean = TRUE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
          covr::codecov(coverage = cov, quiet = FALSE)
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash
