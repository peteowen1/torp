url: https://peteowen1.github.io/torp/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    pkgdown-nav-height: 100px

home:
  title: torp - AFL Analytics in R
  description: >
    Player ratings, expected points, win probability models, season simulations,
    and processed AFL data access.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/peteowen1/torp
      aria-label: GitHub repository

articles:
  - title: Get Started
    navbar: ~
    contents:
      - getting-started
  - title: Guides
    contents:
      - torp-guide
      - visualizations

reference:
  - title: Data Loading
    desc: Load processed AFL data from torpdata GitHub releases
    contents:
      - starts_with("load_")
      - fixtures

  - title: Prediction Models
    desc: Add expected points, win probability, and shot predictions to play-by-play data
    contents:
      - add_epv_vars
      - add_wp_vars
      - add_shot_vars

  - title: Data Cleaning
    desc: Clean and prepare AFL data for analysis
    contents:
      - clean_pbp

  - title: Player Ratings
    desc: Calculate and view TORP player ratings
    contents:
      - calculate_epr_stats
      - calculate_torp
      - calculate_psr_components
      - calculate_psv
      - calculate_psv_components
      - torp_ratings
      - calculate_epr
      - epr_ratings
      - psr_ratings
      - player_game_ratings
      - player_season_ratings
      - player_profile
      - print.torp_player_profile
      - create_player_game_data
      - create_wp_credit
      - calculate_psr
      - explain_epr
      - explain_player_rating
      - explain_player_game
      - explain_player_plays
      - torp_movers
      - team_profile
      - print.torp_team_profile

  - title: Player Stat Ratings
    desc: Estimate and explore player stat rating profiles
    contents:
      - aggregate_team_stat_ratings
      - estimate_player_stat_ratings
      - get_player_stat_ratings
      - player_stat_rating_profile
      - print.torp_stat_rating_profile
      - get_team_stat_ratings
      - team_stat_rating_profile
      - print.torp_team_stat_rating_profile

  - title: Visualization
    desc: Plot functions for game flow, player ratings, simulations, and team comparisons
    contents:
      - starts_with("plot_")
      - theme_torp
      - team_color_scale
      - team_fill_scale

  - title: Season Simulation
    desc: Simulate AFL seasons and predict match outcomes
    contents:
      - starts_with("simulate_")
      - summarise_simulations
      - show_predictions
      - print.torp_sim_results
      - ladder
      - calculate_ladder
      - calculate_final_ladder

  - title: Chain Analysis
    desc: Access and analyse possession chains
    contents:
      - matches("chain")
      - extract_contests

  - title: Match Analysis
    desc: Match-level expected goals, predictions, and head-to-head comparisons
    contents:
      - get_player_game_ratings
      - get_xg
      - calculate_match_xgs
      - head_to_head
      - print.torp_head_to_head

  - title: Model Validation
    desc: Evaluate model performance, calibration, and drift
    contents:
      - starts_with("analyze_")
      - starts_with("detect_")
      - starts_with("calculate_quality")

  - title: Caching
    desc: In-memory and disk caching utilities
    contents:
      - clear_data_cache
      - clear_model_cache
      - clear_all_cache
      - clear_disk_cache
      - starts_with("get_cache")
      - starts_with("get_disk_cache")
      - starts_with("get_model_cache")
      - starts_with("set_disk_cache")
      - starts_with("is_disk")
      - starts_with("read_disk")
      - starts_with("write_disk")

  - title: Constants
    desc: AFL and model constants
    contents:
      - starts_with("AFL_")
      - starts_with("RATING_")
      - starts_with("SIM_")
      - starts_with("WP_")
      - starts_with("FIELD_")
      - starts_with("VALIDATION_")
      - starts_with("CREDIT_")

  - title: Injuries
    desc: Injury data access, matching, and simulation scheduling
    contents:
      - injuries
      - get_all_injuries
      - match_injuries
      - scrape_injuries
      - build_injury_schedule
      - load_injury_data

  - title: Utilities
    desc: Helper and convenience functions
    contents:
      - get_afl_season
      - get_afl_week
      - set_torp_data_repo
      - setup_torp_logging
      - download_torp_data
      - get_local_data_dir
      - save_locally
      - set_local_data_dir
      - torp_replace_teams
      - torp_team_abbr
      - torp_team_full
      - torp_replace_venues

  - title: AFL API
    desc: Access AFL data directly from the API
    contents:
      - get_afl_fixtures
      - get_afl_lineups
      - get_afl_player_details
      - get_afl_player_stats
      - get_afl_results
      - get_afl_ladder

  - title: Internal / Developer
    desc: "Internal utilities accessible via torp::: for model training and data scraping"
    contents:
      - access_api
      - get_players
      - get_round_games
      - get_season_games
      - starts_with("predict_wp_")
      - select_shot_model_vars
      - starts_with("prepare_shot")
      - starts_with("create_shot_model")
      - predict_shot_probabilities

footer:
  structure:
    left: developed_by
    right: built_with
