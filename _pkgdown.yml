url: https://peteowen1.github.io/torp/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    pkgdown-nav-height: 100px

home:
  title: torp - AFL Analytics in R
  description: >
    Player ratings, expected points, win probability models, season simulations,
    and processed AFL data access.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/peteowen1/torp
      aria-label: GitHub repository

articles:
  - title: Get Started
    navbar: ~
    contents:
      - getting-started
  - title: Guides
    contents:
      - torp-guide

reference:
  - title: Data Loading
    desc: Load processed AFL data from torpdata GitHub releases
    contents:
      - starts_with("load_")
      - fixtures

  - title: Prediction Models
    desc: Add expected points, win probability, and shot predictions to play-by-play data
    contents:
      - add_epv_vars
      - add_wp_vars
      - add_shot_vars

  - title: Data Cleaning
    desc: Clean and prepare AFL data for analysis
    contents:
      - clean_pbp
      - starts_with("clean_model")
      - clean_shots_data

  - title: Player Ratings
    desc: Calculate and view TORP player ratings
    contents:
      - calculate_torp_ratings
      - torp_ratings
      - player_game_ratings
      - player_season_ratings
      - player_profile
      - print.torp_player_profile
      - create_player_game_data
      - default_credit_params
      - create_wp_credit
      - calculate_player_stats
      - calculate_psr
      - filter_game_data

  - title: Player Skills
    desc: Estimate and explore player skill profiles
    contents:
      - aggregate_team_skills
      - default_skill_params
      - estimate_player_skills
      - get_player_skills
      - player_skill_profile
      - prepare_skill_data
      - print.torp_skill_profile
      - skill_position_map
      - skill_stat_definitions

  - title: Season Simulation
    desc: Simulate AFL seasons and predict match outcomes
    contents:
      - starts_with("sim_")
      - starts_with("simulate_")
      - summarise_simulations
      - show_predictions
      - print.torp_sim_results
      - prepare_final_dataframe
      - ladder
      - calculate_ladder

  - title: Chain Analysis
    desc: Access and analyse possession chains
    contents:
      - matches("chain")
      - extract_contests

  - title: Match Analysis
    desc: Match-level expected goals, predictions, and head-to-head comparisons
    contents:
      - match_xgs
      - calculate_match_xgs
      - head_to_head
      - print.torp_head_to_head

  - title: Model Validation
    desc: Evaluate model performance, calibration, and drift
    contents:
      - starts_with("evaluate_")
      - starts_with("compare_")
      - starts_with("create_calibration")
      - starts_with("create_validation")
      - starts_with("create_model")
      - starts_with("log_model")
      - starts_with("monitor_")
      - starts_with("validate_")
      - starts_with("analyze_")
      - starts_with("detect_")
      - starts_with("calculate_quality")

  - title: Model Training
    desc: Utilities for model development and cross-validation
    contents:
      - starts_with("create_grouped")
      - starts_with("create_temporal")
      - select_epv_model_vars
      - select_wp_model_vars
      - select_afl_model_vars
      - select_afl_xgb_vars

  - title: Caching
    desc: In-memory and disk caching utilities
    contents:
      - starts_with("clear_")
      - starts_with("get_cache")
      - starts_with("get_disk_cache")
      - starts_with("get_model_cache")
      - starts_with("set_disk_cache")
      - starts_with("is_cache")
      - starts_with("is_disk")
      - starts_with("store_in")
      - starts_with("get_from")
      - starts_with("read_disk")
      - starts_with("write_disk")

  - title: Constants
    desc: AFL and model constants
    contents:
      - starts_with("AFL_")
      - starts_with("RATING_")
      - starts_with("SIM_")
      - starts_with("WP_")
      - starts_with("FIELD_")
      - starts_with("VALIDATION_")
      - starts_with("CREDIT_")

  - title: Injuries
    desc: Injury data access and matching
    contents:
      - injuries
      - get_all_injuries
      - match_injuries
      - scrape_injuries

  - title: Utilities
    desc: Helper and convenience functions
    contents:
      - get_afl_season
      - get_afl_week
      - parquet_from_url
      - save_to_release
      - set_torp_data_repo
      - setup_torp_logging
      - download_torp_data
      - get_local_data_dir
      - save_locally
      - set_local_data_dir
      - torp_replace_teams
      - torp_team_abbr
      - torp_team_full
      - torp_replace_venues

  - title: AFL API
    desc: Access AFL data directly from the API
    contents:
      - get_afl_fixtures
      - get_afl_lineups
      - get_afl_player_details
      - get_afl_player_stats
      - get_afl_results

  - title: Internal / Developer
    desc: "Internal utilities accessible via torp::: for model training and data scraping"
    contents:
      - access_api
      - get_players
      - get_round_games
      - get_season_games
      - starts_with("predict_wp_")
      - select_shot_model_vars
      - starts_with("prepare_shot")
      - starts_with("create_shot_model")
      - predict_shot_probabilities

footer:
  structure:
    left: developed_by
    right: built_with
